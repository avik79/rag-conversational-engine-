name: CD - Build & Deploy

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  workflow_run:
    workflows: [ "CI - Tests & Quality Checks" ]
    branches: [ master, main ]
    types: [ completed ]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip build wheel twine

    - name: Build distribution packages
      run: |
        python -m build

    - name: Generate build metadata
      id: meta
      run: |
        echo "version=$(python -c 'import setuptools; print(setuptools.__version__)')" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
        echo "git-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          dist/
          build/

    - name: Create release notes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "## Release $(echo ${{ github.ref }} | sed 's|refs/tags/||')" > release-notes.md
        echo "" >> release-notes.md
        echo "### Build Info" >> release-notes.md
        echo "- Timestamp: ${{ steps.meta.outputs.timestamp }}" >> release-notes.md
        echo "- Git SHA: ${{ steps.meta.outputs.git-sha }}" >> release-notes.md
        echo "" >> release-notes.md
        echo "### Files" >> release-notes.md
        ls -lh dist/ | awk '{print "- " $9 " (" $5 ")"}' >> release-notes.md

    - name: Upload release notes
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v3
      with:
        name: release-notes
        path: release-notes.md

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      if: secrets.DOCKERHUB_USERNAME != ''
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: [ build, docker-build ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    environment:
      name: staging
      url: https://staging-eira.example.com

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to staging
      env:
        DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
      run: |
        echo "Deploying to staging environment..."
        # Example deployment script (replace with your actual deployment logic)
        # ssh -i $DEPLOY_KEY $DEPLOY_USER@$DEPLOY_HOST "cd /app && git pull && uv sync && streamlit run app/main.py"

    - name: Run smoke tests
      run: |
        echo "Running smoke tests on staging..."
        # Add smoke tests here

    - name: Create deployment record
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.deployments.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: 'staging',
            description: 'Deployment to staging',
            auto_merge: false,
          })

  deploy-prod:
    needs: [ build, docker-build ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
    environment:
      name: production
      url: https://eira.example.com

    steps:
    - uses: actions/checkout@v4

    - name: Wait for approval
      run: |
        echo "Awaiting manual approval before production deployment..."

    - name: Deploy to production
      env:
        DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
        TAG: ${{ github.ref_name }}
      run: |
        echo "Deploying version $TAG to production..."
        # Example deployment script (replace with your actual deployment logic)
        # ssh -i $DEPLOY_KEY $DEPLOY_USER@$DEPLOY_HOST "cd /app && git checkout $TAG && uv sync && systemctl restart eira"

    - name: Run health checks
      run: |
        echo "Running health checks on production..."
        # Add health check tests here

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        body_path: release-notes.md
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify deployment success
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment.id,
            state: 'success',
            description: 'Deployment successful',
          })

    - name: Notify deployment failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment.id,
            state: 'failure',
            description: 'Deployment failed',
          })
